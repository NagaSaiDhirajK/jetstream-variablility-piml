project:
  name: jetstream_piml
  seed: 42
  output_dir: outputs

data:
  raw_glob: data/raw/*.nc
  input_norm_path: null  # Optional precomputed NPZ with input_mean/input_std.
  levels_hpa: [200, 250, 300]  # Preferred; loader falls back to available levels if 300 is missing.
  temporal_resolution_utc_hours: [0, 6, 12, 18]
  split:
    train: 0.70
    val: 0.15
    test: 0.15
  chunking:
    time: 32
  time_stride: 1
  max_samples: null

model:
  hidden_channels: 64
  num_res_blocks: 4
  dropout: 0.05
  use_bottom_residual: true

training:
  batch_size: 8
  epochs: 20
  lr: 0.001
  weight_decay: 0.00001
  grad_clip_norm: 1.0
  data_loss: huber
  huber_delta: 5.0
  physics_warmup_epochs: 3
  lr_scheduler: plateau
  plateau_factor: 0.5
  plateau_patience: 3
  min_lr: 0.000001
  early_stopping_patience: null
  early_stopping_min_delta: 0.0
  num_workers: 4
  pin_memory: true
  use_mixed_precision: true
  normalize_inputs: true
  device: auto
  max_train_batches: null
  max_val_batches: null

physics:
  lambda_geo: 0.05
  lambda_tw: 0.05
  lambda_div: 0.02
  lambda_vort: 0.02

aviation:
  aircraft_true_airspeed_ms: 230.0
  corridors: [midwest_to_east, transcon_us, north_atlantic]

evaluation:
  corridor: transcon_us
  max_test_batches: 8
